name: Deploy Nginx to RKE2
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 54.252.146.120
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # We use 'sudo su -' behavior by calling 'bash -c' as root
            sudo su - root -c "
              # 1. Setup Environment inside the root shell
              export CRI_CONFIG_FILE=/var/lib/rancher/rke2/agent/etc/crictl.yaml
              export KUBECONFIG=/etc/rancher/rke2/rke2.yaml
              export PATH=\$PATH:/var/lib/rancher/rke2/bin

              # 2. Deploy Nginx
              kubectl apply -f - <<EOF
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: nginx-deployment
              spec:
                replicas: 2
                selector:
                  matchLabels:
                    app: nginx
                template:
                  metadata:
                    labels:
                      app: nginx
                  spec:
                    containers:
                    - name: nginx
                      image: nginx:latest
                      ports:
                      - containerPort: 80
              ---
              apiVersion: v1
              kind: Service
              metadata:
                name: nginx-service
              spec:
                selector:
                  app: nginx
                ports:
                  - protocol: TCP
                    port: 80
                    targetPort: 80
                type: NodePort
              EOF

              # 3. Status check
              kubectl rollout status deployment/nginx-deployment
            "
