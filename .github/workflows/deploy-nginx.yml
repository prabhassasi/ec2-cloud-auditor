name: Deploy Nginx to RKE2
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 54.252.146.120
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # 1. Create the manifest as the 'ubuntu' user first
            cat << 'EOF' > /tmp/nginx-app.yaml
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: nginx-deployment
            spec:
              replicas: 2
              selector:
                matchLabels:
                  app: nginx
              template:
                metadata:
                  labels:
                    app: nginx
                spec:
                  containers:
                  - name: nginx
                    image: nginx:latest
                    ports:
                    - containerPort: 80
            ---
            apiVersion: v1
            kind: Service
            metadata:
              name: nginx-service
            spec:
              selector:
                app: nginx
              ports:
                - protocol: TCP
                  port: 80
                  targetPort: 80
              type: NodePort
            EOF

            # 2. Use sudo su - to execute the deployment as root
            sudo su - root -c "
              # Setup Environment
              export CRI_CONFIG_FILE=/var/lib/rancher/rke2/agent/etc/crictl.yaml
              export KUBECONFIG=/etc/rancher/rke2/rke2.yaml
              export PATH=\$PATH:/var/lib/rancher/rke2/bin

              # Apply from the file we just created
              kubectl apply -f /tmp/nginx-app.yaml
              kubectl rollout status deployment/nginx-deployment
            "

            # 3. Cleanup
            rm /tmp/nginx-app.yaml
